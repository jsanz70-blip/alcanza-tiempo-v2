<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" href="/favicon.ico" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#1B3A5C" />
		<meta name="generator" content="Hostinger Horizons" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
		<meta http-equiv="Pragma" content="no-cache" />
		<meta http-equiv="Expires" content="0" />
		<title>Alcanza - Gestión de Tiempo</title>
		<script>
			// Service Worker DESACTIVADO intencionalmente
			// Causaba problemas de sincronización al cachear versiones antiguas.
			// El offline se maneja via localStorage (supabaseClient.js)
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.getRegistrations().then(regs => {
					regs.forEach(r => r.unregister());
				});
			}
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
